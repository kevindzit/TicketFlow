{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="login-box">
    <h2>Forgot Password</h2>
    <p style="margin-bottom: 15px; color: #666;">Enter your email to receive a reset link.</p>
    <form method="POST">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <button type="submit" class="btn">Send Reset Link</button>
    </form>
    <p style="margin-top: 15px;"><a href="{{ url_for('auth.login') }}">Back to Login</a></p>
</div>
{% endblock %}
